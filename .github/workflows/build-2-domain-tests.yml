name: Build 2 Domain and Contract Tests

on:
  push:
    paths:
      - 'public/app/domain/**'
      - 'public/app/contracts/**'
      - 'tests/build-2/**'
      - 'docs/build-2/contracts/examples/**'
      - '.github/workflows/build-2-domain-tests.yml'
  pull_request:
    paths:
      - 'public/app/domain/**'
      - 'public/app/contracts/**'
      - 'tests/build-2/**'
      - 'docs/build-2/contracts/examples/**'
      - '.github/workflows/build-2-domain-tests.yml'

permissions:
  contents: read

concurrency:
  group: build-2-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-2-tests:
    name: Canonical domain and data contracts
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run Build 2 domain tests
        run: node --test tests/build-2/domain/*.test.mjs

      - name: Run Build 2 contract tests
        run: node --test tests/build-2/contracts/*.test.mjs
