name: Runtime Record Integrity

on:
  push:
    paths:
      - 'functions/_middleware.js'
      - 'public/css/gate-utilities-access.css'
      - 'public/css/gate-premium-metrics.css'
      - 'public/js/gate-record-display-contract.js'
      - 'public/js/gate-status-board-controller.js'
      - 'public/js/gate-premium-metrics-controller.js'
      - 'public/js/gate-render-stability-fix.js'
      - 'public/js/gate-processing-controller.js'
      - 'public/js/gate-input-page-controller.js'
      - 'public/js/prc-dash-final-audit.js'
      - 'public/js/prc-dash-dorm-flag-validation.js'
      - 'tests/runtime/**'
      - '.github/workflows/runtime-record-integrity-tests.yml'
  pull_request:
    paths:
      - 'functions/_middleware.js'
      - 'public/css/gate-utilities-access.css'
      - 'public/css/gate-premium-metrics.css'
      - 'public/js/gate-record-display-contract.js'
      - 'public/js/gate-status-board-controller.js'
      - 'public/js/gate-premium-metrics-controller.js'
      - 'public/js/gate-render-stability-fix.js'
      - 'public/js/gate-processing-controller.js'
      - 'public/js/gate-input-page-controller.js'
      - 'public/js/prc-dash-final-audit.js'
      - 'public/js/prc-dash-dorm-flag-validation.js'
      - 'tests/runtime/**'
      - '.github/workflows/runtime-record-integrity-tests.yml'

permissions:
  contents: read

concurrency:
  group: runtime-record-integrity-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  record-integrity:
    name: Runtime record and visual integrity
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Parse active JavaScript
        run: |
          node --input-type=module --check < functions/_middleware.js
          node --check public/js/gate-record-display-contract.js
          node --check public/js/gate-status-board-controller.js
          node --check public/js/gate-premium-metrics-controller.js
          node --check public/js/gate-render-stability-fix.js
          node --check public/js/gate-processing-controller.js
          node --check public/js/gate-input-page-controller.js
          node --check public/js/prc-dash-final-audit.js
          node --check public/js/prc-dash-dorm-flag-validation.js

      - name: Record display integrity
        run: node --test tests/runtime/record-display-integrity.test.mjs

      - name: Direct surface observer contract
        run: node --test --test-name-pattern='observer is limited' tests/runtime/status-board-visual-stability.test.mjs

      - name: Incremental column rendering contract
        run: node --test --test-name-pattern='renders dorm states incrementally' tests/runtime/status-board-visual-stability.test.mjs

      - name: Fixed timer geometry contract
        run: node --test --test-name-pattern='timer geometry' tests/runtime/status-board-visual-stability.test.mjs

      - name: Fluid metric typography contract
        run: node --test --test-name-pattern='metrics scale' tests/runtime/status-board-visual-stability.test.mjs

      - name: Change-only metric cadence contract
        run: node --test --test-name-pattern='Metric synchronization' tests/runtime/status-board-visual-stability.test.mjs

      - name: Served-source delegation contract
        run: node --test --test-name-pattern='Served source delegates' tests/runtime/status-board-visual-stability.test.mjs

      - name: Status Board compositing retirement contract
        run: node --test --test-name-pattern='compositing guard' tests/runtime/status-board-visual-stability.test.mjs
