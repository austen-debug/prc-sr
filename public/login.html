<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRC-SR Login</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      background: #121212;
      color: #e8e8e8;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
  <main class="w-full max-w-md border rounded-xl p-8" style="background:#1e1e1e;border-color:#333;">
    <div class="text-center mb-6">
      <div class="text-xs font-black tracking-widest text-white py-2 px-3 rounded mb-4" style="background:#16a34a;">
        UNCLASSIFIED / NO PII / STATUS COUNTS ONLY
      </div>
      <h1 class="text-3xl font-black">PRC-SR</h1>
      <p class="text-sm mt-2" style="color:#8a8a8a;">Pfingston Reception Status Board</p>
    </div>

    <form id="login-form" class="space-y-4">
      <div>
        <label for="username" class="block text-sm font-bold mb-1">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required
          class="w-full rounded px-3 py-3 bg-transparent border"
          style="border-color:#333;color:#e8e8e8;">
      </div>

      <div>
        <label for="password" class="block text-sm font-bold mb-1">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required
          class="w-full rounded px-3 py-3 bg-transparent border"
          style="border-color:#333;color:#e8e8e8;">
      </div>

      <button type="submit" class="w-full py-3 rounded-lg font-black text-white" style="background:#16a34a;">
        LOGIN
      </button>

      <div id="login-message" class="hidden text-center text-sm font-bold"></div>
    </form>
  </main>

  <script>
    const form = document.getElementById('login-form');
    const msg = document.getElementById('login-message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      msg.classList.add('hidden');

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      const response = await fetch('/api/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Accept': 'application/json'
        },
        body: JSON.stringify({ username, password })
      });

      const result = await response.json();

      if (result.isOk) {
        window.location.href = '/';
        return;
      }

      msg.textContent = result.error || 'Login failed.';
      msg.style.color = '#dc2626';
      msg.classList.remove('hidden');
    });
  </script>
</body>
</html>
