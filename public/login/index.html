<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRC DASH Login</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/liquid-command.css">
  <link rel="stylesheet" href="/css/prc-dash-login.css">
</head>
<body class="login-page min-h-screen flex items-center justify-center px-4">
  <main class="login-shell">
    <section class="login-card">
      <div class="text-center mb-6">
        <div class="login-classification">
          UNCLASSIFIED / NO PII / STATUS COUNTS ONLY
        </div>

        <div class="login-brand-mark">
          PRC DASH
        </div>

        <h1 class="login-title">PRC DASH</h1>
        <p class="login-subtitle mt-3">Pfingston Reception Command Dashboard</p>
      </div>

      <form id="login-form" class="login-form space-y-4">
        <div>
          <label for="username" class="block mb-1">Username</label>
          <input id="username" name="username" type="text" autocomplete="username" required>
        </div>

        <div>
          <label for="password" class="block mb-1">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required>
        </div>

        <button type="submit" class="login-button">
          Login
        </button>

        <div id="login-message" class="hidden text-center text-sm font-bold"></div>
      </form>

      <div class="login-footer-note">
        Shared access by authorized PRC personnel only
      </div>
    </section>
  </main>

  <script>
    const form = document.getElementById('login-form');
    const msg = document.getElementById('login-message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      msg.classList.add('hidden');

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      const response = await fetch('/api/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Accept': 'application/json'
        },
        body: JSON.stringify({ username, password })
      });

      const result = await response.json();

      if (result.isOk) {
        window.location.href = '/';
        return;
      }

      msg.textContent = result.error || 'Login failed.';
      msg.style.color = '#dc2626';
      msg.classList.remove('hidden');
    });
  </script>
</body>
</html>
